<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT AGENT DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tungsten:wght@400;600;700&family=DIN+Next+LT+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="database.js"></script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text"><span><img src="assets/extra/ValorantLogo.png" alt="valorant-logo" class="valorant-logo"></span>VALORANT</div>
      <div class="logo-sub">Agent Intelligence System</div>
    </div>

    <div class="nav-item active" data-view="home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      Home
    </div>

    <div class="nav-item" data-view="agents">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
        <path d="M8 8h8"/>
        <path d="M8 12h8"/>
        <path d="M8 16h5"/>
      </svg> 
      Agents
    </div>

    <div class="nav-item" data-view="roles">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="12" cy="12" r="1" fill="currentColor"/>
      </svg>
      Roles
    </div>

    <div class="nav-item" data-view="users">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Users
    </div>
  </nav>

  <main class="main">
    <section id="page-home" class="page-section active">
      <div class="topbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" type="text" placeholder="Search for agents..." id="search-input">
        </div>
        <div class="page-title">HOME</div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-role="all">
          All
        </button>

        <button class="filter-btn duelist" data-role="Duelist">
          <img src="./assets/roles/DuelistClassSymbol.png" alt="" class="roleIcon">
          Duelist
        </button>

        <button class="filter-btn controller" data-role="Controller">
          <img src="./assets/roles/ControllerClassSymbol.png" alt="" class="roleIcon">
          Controller
        </button>

        <button class="filter-btn sentinel" data-role="Sentinel">
          <img src="./assets/roles/SentinelClassSymbol.png" alt="" class="roleIcon">
          Sentinel
        </button>

        <button class="filter-btn initiator" data-role="Initiator">
          <img src="./assets/roles/InitiatorClassSymbol.png" alt="" class="roleIcon">
          Initiator
        </button>
      </div>

      <div class="table-container">
        <div class="table-header">
          <div class="col-label sortable sorted" data-sort="name">NAME<span class="sort-arrow">▲</span></div>
          <div class="col-label sortable" data-sort="releaseDate">RELEASE DATE<span class="sort-arrow">▲</span></div>
          <div class="col-label">SPECIAL ABILITIES</div>
          <div class="col-label">DIFFICULTY</div>
          <div class="col-label">BEGINNER FRIENDLY</div>
          <div class="col-label">DETAILS</div>
        </div>
        <div id="agents-list"></div>
      </div>
    </section>

    <section id="page-agents" class="page-section">
      <div class="topbar">
        <div class="page-title">AGENTS</div>
      </div>
      <div class="agents-page" id="agents-grid"></div>
    </section>

    <section id="page-roles" class="page-section">
      <div class="topbar">
        <div class="page-title">ROLES</div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <div class="col-label">ROLE</div>
          <div class="col-label">PLAYSTYLE</div>
          <div class="col-label">DESCRIPTION</div>
          <div class="col-label">RESPONSABILITY</div>
        </div>
        <div id="roles-list"></div>
      </div>
    </section>
  </main>

  <!-- Agent popup -->
  <div class="agent-popup" id="agent-popup">
    <div class="popup" id="popup-content">
      <button class="popup-close">✕</button>
      <div id="popup-inner"></div>
    </div>
  </div>

  <!-- Role popup -->
  <div class="agent-popup" id="role-popup">
    <div class="popup" id="role-popup-content">
      <button class="popup-close role-popup-close">✕</button>
      <div id="role-popup-inner"></div>
    </div>
  </div>
</body>
</html>
